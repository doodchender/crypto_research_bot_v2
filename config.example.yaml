# ============================================================
#  Конфигурация Telegram-бота
#  Скопируйте этот файл в config.yaml и впишите свой токен.
#  (config.yaml не попадёт на GitHub — он в .gitignore)
# ============================================================

# Токен бота от @BotFather — ОБЯЗАТЕЛЬНО
bot_token: "PASTE_YOUR_TELEGRAM_BOT_TOKEN_HERE"

# Telegram ID администратора: кому слать уведомления о китах и отчёты.
# Узнать свой ID можно у бота @userinfobot. 0 — отключить.
admin_id: 0

# Кому рассылать ежедневный отчёт (список chat_id). Можно оставить пустым.
daily_chat_ids: []

# Время ежедневного дайджеста по Москве, формат ЧЧ:ММ
digest_time: "09:00"

# Почасовой сбор снапшотов рынка в базу
hourly_snapshot_enabled: true

# Отслеживать открытый интерес (OI) в почасовом трекере
track_oi: true

# Режим защиты: false = тяжёлые фоновые трекеры (киты/поток/intraday/paper)
# не запускаются, бот стартует мгновенно и отвечает без задержек.
# true = полный режим со всеми трекерами (бот при старте грузится дольше).
heavy_trackers_enabled: false

# Папка с новостными данными для анализа влияния сентимента (необязательно:
# если папки нет — бот просто пропустит этот шаг и продолжит работу).
ofefki_path: "../ofefki"

# Логирование
logging:
  level: "INFO"          # DEBUG / INFO / WARNING / ERROR
  log_to_file: true      # дублировать логи в файл (папка logs)

# Пути для данных и логов (относительно папки бота)
paths:
  data: "data"
  logs: "logs"

# Параметры HTTP-запросов к внешним API
api:
  fear_greed_url: "https://api.alternative.me/fng/"
  max_retries: 3
  retry_delay_seconds: 5
  request_timeout: 30
